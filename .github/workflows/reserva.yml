name: Reserva automatica de padel

on:
  # Disparado exclusivamente por el cron de Vercel via workflow_dispatch.
  # workflow_dispatch es inmediato (sin demoras de cola de GitHub).
  # El handler de Vercel ya filtra por ventana horaria Madrid 23:45-00:45.
  workflow_dispatch:

jobs:
  reservar:
    runs-on: ubuntu-latest
    # El job espera hasta medianoche Madrid: en invierno el cron dispara ~70 min
    # antes, así que el timeout debe cubrir esa espera + la reserva.
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Instalar Chromium para Playwright
        run: npx playwright install chromium --with-deps

      - name: Ejecutar reserva
        env:
          HPL_USUARIO: ${{ secrets.HPL_USUARIO }}
          HPL_PASSWORD: ${{ secrets.HPL_PASSWORD }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          FORCE: 'false'
        run: npm start

      - name: Guardar screenshots (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug-*.png
          retention-days: 7
