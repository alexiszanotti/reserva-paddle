name: Reserva automatica de padel

on:
  schedule:
    # Martes a las 00:00:01 CEST = lunes 22:00 UTC
    - cron: "0 22 * * 1"
    # Jueves a las 00:00:01 CEST = miércoles 22:00 UTC
    - cron: "0 22 * * 3"
  workflow_dispatch: # permite ejecución manual para pruebas

jobs:
  reservar:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar Chromium para Playwright
        run: npx playwright install chromium --with-deps

      - name: Ejecutar reserva
        env:
          HPL_USUARIO: ${{ secrets.HPL_USUARIO }}
          HPL_PASSWORD: ${{ secrets.HPL_PASSWORD }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          RESERVA_HORA: ${{ secrets.RESERVA_HORA }}
          FORCE: "false"
        run: npm start

      - name: Guardar screenshots (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug-*.png
          retention-days: 7
